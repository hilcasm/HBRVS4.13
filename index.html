<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBD RVS 4.13</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel+Decorative:wght@900&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #04020c;
      --c1: #c4b5fd;
      --c2: #f9a8d4;
      --c3: #6ee7b7;
      --c4: #fde68a;
      --c5: #93c5fd;
      --c6: #fb7185;
      --c7: #a78bfa;
      --c8: #34d399;
      --text: #f1f0fb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: var(--text);
      background: var(--bg-deep);
    }

    .bg-nebula {
      position: fixed; inset: 0; z-index: -2;
      background: var(--bg-deep);
    }

    #nebulaCanvas {
      position: fixed; inset: 0; z-index: -1;
      pointer-events: none;
    }

    .scanlines {
      position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.012) 0 1px,
        transparent 1px 3px
      );
      z-index: 18;
    }

    .wrapper {
      position: relative; width: 100%; height: 100%;
      display: grid; place-items: center; overflow: hidden;
    }

    .text-wall {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      font-weight: 900;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      line-height: 1.12;
      pointer-events: none; user-select: none;
      z-index: 0;
      overflow: hidden;
    }

    .text-row {
      width: 100%;
      text-align: center;
      font-size: clamp(1.1rem, 3.2vw, 3.4rem);
      white-space: nowrap;
      overflow: hidden;
    }

    .text-row span { display: inline; font-family: 'Bebas Neue', sans-serif; }

    .text-row:nth-child(1) span { color: var(--c1); text-shadow: 0 0 14px rgba(196,181,253,1), 0 0 40px rgba(196,181,253,0.7); opacity: 0.7; }
    .text-row:nth-child(2) span { color: var(--c5); text-shadow: 0 0 14px rgba(147,197,253,1), 0 0 40px rgba(147,197,253,0.7); opacity: 0.65; }
    .text-row:nth-child(3) span { color: var(--c3); text-shadow: 0 0 14px rgba(110,231,183,1), 0 0 40px rgba(110,231,183,0.7); opacity: 0.68; }
    .text-row:nth-child(4) span { color: var(--c4); text-shadow: 0 0 14px rgba(253,230,138,1), 0 0 40px rgba(253,230,138,0.7); opacity: 0.7; }
    .text-row:nth-child(5) span { color: var(--c2); text-shadow: 0 0 14px rgba(249,168,212,1), 0 0 40px rgba(249,168,212,0.7); opacity: 0.65; }
    .text-row:nth-child(6) span { color: var(--c6); text-shadow: 0 0 14px rgba(251,113,133,1), 0 0 40px rgba(251,113,133,0.7); opacity: 0.68; }
    .text-row:nth-child(7) span { color: var(--c1); text-shadow: 0 0 14px rgba(196,181,253,1), 0 0 40px rgba(196,181,253,0.7); opacity: 0.65; }

    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

    .floating-images { position: absolute; inset: 0; pointer-events: none; z-index: 3; }

    .float-wrap {
      position: absolute;
      width: clamp(120px, 14vw, 190px);
      height: clamp(120px, 14vw, 190px);
      will-change: transform, left, top;
      transition: opacity 0.6s ease;
    }

    .float-wrap svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      overflow: visible;
    }

    .center-card {
      position: relative; z-index: 6;
      text-align: center; pointer-events: none;
      will-change: transform;
      padding: 2.5rem 3.5rem;
      border-radius: 2rem;
    }

    .center-card::before {
      content: '';
      position: absolute; inset: -20px;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(4,2,12,0.92) 0%, transparent 100%);
      border-radius: 3rem;
      z-index: -1;
    }

    .hb-main {
      display: block;
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 5vw, 4.8rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.1;
      color: #ffffff;
      text-shadow:
        0 0 20px rgba(196,181,253,1),
        0 0 50px rgba(196,181,253,0.6),
        0 0 100px rgba(196,181,253,0.3),
        0 2px 6px rgba(0,0,0,0.95);
    }

    .rain-name {
      display: inline-block;
      transition: color 1.4s cubic-bezier(0.4,0,0.2,1), text-shadow 1.4s cubic-bezier(0.4,0,0.2,1);
    }

    .hb-sub {
      margin-top: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.6rem, 1.1vw, 0.85rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(200,210,255,0.4);
    }

    .lyric {
      position: fixed; bottom: 1.2rem; left: 50%;
      transform: translateX(-50%);
      font-size: clamp(0.65rem, 1.1vw, 0.82rem);
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(210,220,255,0.35);
      z-index: 9; pointer-events: none; white-space: nowrap;
      font-family: 'Space Mono', monospace;
    }

    .ripple {
      position: fixed;
      width: 16px; height: 16px;
      margin-left: -8px; margin-top: -8px;
      border-radius: 50%;
      border: 1.5px solid rgba(196,181,253,0.55);
      pointer-events: none;
      animation: ripple 700ms cubic-bezier(0.2,0.8,0.4,1) forwards;
      z-index: 30;
    }

    @keyframes ripple {
      from { transform: scale(1); opacity: 0.8; }
      to   { transform: scale(11); opacity: 0; }
    }

    #music-btn {
      position: fixed; top: 1.2rem; right: 1.4rem; z-index: 20;
      background: rgba(196,181,253,0.07);
      border: 1px solid rgba(196,181,253,0.22);
      color: rgba(200,210,255,0.6);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.45rem 1rem; border-radius: 2rem; cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    #music-btn:hover { background: rgba(196,181,253,0.16); color: rgba(220,210,255,0.95); border-color: rgba(196,181,253,0.45); }

    #gb-toggle {
      position: fixed; top: 1.2rem; left: 1.4rem; z-index: 25;
      background: rgba(196,181,253,0.07);
      border: 1px solid rgba(196,181,253,0.22);
      color: rgba(200,210,255,0.6);
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.45rem 1rem; border-radius: 2rem; cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    #gb-toggle:hover { background: rgba(196,181,253,0.16); color: rgba(220,210,255,0.95); border-color: rgba(196,181,253,0.45); }

    #gb-panel {
      position: fixed; top: 4rem; left: 1.4rem; z-index: 24;
      width: clamp(300px, 32vw, 400px);
      background: rgba(4,2,12,0.96);
      border: 1px solid rgba(196,181,253,0.2);
      border-radius: 1.4rem;
      backdrop-filter: blur(24px);
      padding: 1.3rem;
      display: none; flex-direction: column; gap: 0.85rem;
      max-height: calc(100vh - 6rem);
    }
    #gb-panel.open { display: flex; }

    #gb-panel-title {
      font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(196,181,253,0.5); text-align: center;
      font-family: 'Space Mono', monospace;
    }

    #gb-msgs {
      display: flex; flex-direction: column; gap: 0.65rem;
      overflow-y: auto; max-height: 280px; padding-right: 4px;
    }
    #gb-msgs::-webkit-scrollbar { width: 3px; }
    #gb-msgs::-webkit-scrollbar-thumb { background: rgba(196,181,253,0.22); border-radius: 2px; }

    .gb-bubble {
      background: rgba(196,181,253,0.05);
      border: 1px solid rgba(196,181,253,0.1);
      border-radius: 0.8rem;
      padding: 0.55rem 0.8rem;
      animation: bubbleIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(8px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .gb-bname { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'Space Mono', monospace; }
    .gb-btime { font-size: 0.56rem; color: rgba(200,210,255,0.25); float: right; margin-top: 1px; font-family: 'Space Mono', monospace; }
    .gb-btext { font-size: 0.78rem; color: rgba(241,240,251,0.8); line-height: 1.5; margin-top: 0.25rem; word-break: break-word; font-family: 'Space Mono', monospace; }
    .gb-gif-preview { max-width: 100%; max-height: 160px; border-radius: 0.5rem; margin-top: 0.4rem; display: block; }

    #gb-empty-msg {
      text-align: center; font-size: 0.72rem; color: rgba(200,210,255,0.25);
      padding: 1.2rem 0; letter-spacing: 0.07em; font-family: 'Space Mono', monospace;
    }

    .gb-input {
      background: rgba(196,181,253,0.05);
      border: 1px solid rgba(196,181,253,0.16);
      border-radius: 0.6rem;
      color: rgba(241,240,251,0.9);
      font-family: 'Space Mono', monospace;
      font-size: 0.76rem; padding: 0.5rem 0.75rem; outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    .gb-input::placeholder { color: rgba(200,210,255,0.22); }
    .gb-input:focus { border-color: rgba(196,181,253,0.4); }
    textarea.gb-input { resize: none; }

    .gb-row { display: flex; gap: 0.5rem; }

    #gb-gif-btn {
      background: rgba(196,181,253,0.07);
      border: 1px solid rgba(196,181,253,0.2);
      border-radius: 0.6rem;
      color: rgba(196,181,253,0.75);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.5rem 0.8rem; cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    #gb-gif-btn:hover { background: rgba(196,181,253,0.16); }

    #gif-picker {
      background: rgba(4,2,12,0.98);
      border: 1px solid rgba(196,181,253,0.18);
      border-radius: 0.8rem;
      padding: 0.6rem;
      display: none; flex-direction: column; gap: 0.5rem;
    }
    #gif-picker.open { display: flex; }

    #gif-search-input {
      background: rgba(196,181,253,0.05);
      border: 1px solid rgba(196,181,253,0.16);
      border-radius: 0.5rem;
      color: rgba(241,240,251,0.9);
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem; padding: 0.45rem 0.65rem; outline: none; width: 100%;
    }
    #gif-search-input::placeholder { color: rgba(200,210,255,0.22); }

    #gif-results {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.35rem;
      max-height: 180px; overflow-y: auto;
    }
    #gif-results::-webkit-scrollbar { width: 3px; }
    #gif-results::-webkit-scrollbar-thumb { background: rgba(196,181,253,0.2); border-radius: 2px; }

    .gif-item {
      border-radius: 0.4rem; overflow: hidden; cursor: pointer;
      aspect-ratio: 1; background: rgba(196,181,253,0.05);
      transition: transform 0.15s, opacity 0.15s;
      border: 1px solid transparent;
    }
    .gif-item:hover { transform: scale(1.05); border-color: rgba(196,181,253,0.35); }
    .gif-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gif-item.selected { border-color: rgba(110,231,183,0.6); }

    #gif-loading { text-align: center; font-size: 0.65rem; color: rgba(200,210,255,0.3); padding: 0.8rem; font-family: 'Space Mono', monospace; letter-spacing: 0.08em; }

    .gif-selected-preview {
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(110,231,183,0.06);
      border: 1px solid rgba(110,231,183,0.2);
      border-radius: 0.6rem; padding: 0.4rem 0.6rem;
    }
    .gif-selected-preview img { width: 42px; height: 42px; object-fit: cover; border-radius: 0.3rem; }
    .gif-selected-preview span { font-size: 0.62rem; color: rgba(110,231,183,0.7); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'Space Mono', monospace; flex: 1; }
    .gif-clear-btn { background: none; border: none; color: rgba(251,113,133,0.6); cursor: pointer; font-size: 0.8rem; padding: 0.1rem 0.3rem; }
    .gif-clear-btn:hover { color: rgba(251,113,133,1); }

    #gb-send-btn {
      background: rgba(196,181,253,0.09);
      border: 1px solid rgba(196,181,253,0.25);
      border-radius: 0.6rem;
      color: rgba(196,181,253,0.85);
      font-family: 'Space Mono', monospace;
      font-size: 0.66rem; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.52rem; width: 100%; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    #gb-send-btn:hover { background: rgba(196,181,253,0.18); border-color: rgba(196,181,253,0.48); }
    #gb-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #gb-feedback {
      font-size: 0.6rem; letter-spacing: 0.09em; text-transform: uppercase;
      text-align: center; min-height: 0.85rem; color: rgba(110,231,183,0.7);
      font-family: 'Space Mono', monospace;
    }
    #gb-count-label {
      font-size: 0.56rem; color: rgba(200,210,255,0.2); text-align: center;
      letter-spacing: 0.08em; font-family: 'Space Mono', monospace;
    }

    @media (max-width: 600px) {
      .text-row { font-size: clamp(1rem, 6vw, 2rem); }
      .float-wrap { width: clamp(80px, 18vw, 130px); height: clamp(80px, 18vw, 130px); }
      #gb-panel { width: calc(100vw - 2.8rem); }
      .hb-main { font-size: clamp(1.1rem, 6vw, 3rem); }
    }
  </style>
</head>
<body>
  <div class="bg-nebula"></div>
  <canvas id="nebulaCanvas"></canvas>
  <canvas id="particles"></canvas>
  <div class="scanlines"></div>

  <audio id="bgMusic" loop>
    <source src="Fake-Plastic-Trees-Radiohead.mp3" type="audio/mpeg">
  </audio>

  <button id="music-btn">&#9654; play music</button>
  <button id="gb-toggle">✦ messages</button>

  <div id="gb-panel">
    <p id="gb-panel-title">leave a message for rain ♡</p>
    <div id="gb-msgs"><p id="gb-empty-msg">no messages yet — be the first!</p></div>
    <input class="gb-input" type="text" id="gb-name" placeholder="your name" maxlength="32" />
    <div class="gb-row">
      <textarea class="gb-input" id="gb-msg" rows="2" placeholder="say something nice..." maxlength="280"></textarea>
      <button id="gb-gif-btn">GIF</button>
    </div>
    <div id="gif-picker">
      <input type="text" id="gif-search-input" placeholder="search gifs..." />
      <div id="gif-loading" style="display:none">searching...</div>
      <div id="gif-results"></div>
    </div>
    <div id="gif-selected-wrap" style="display:none" class="gif-selected-preview">
      <img id="gif-selected-img" src="" alt="selected gif" />
      <span>gif selected</span>
      <button class="gif-clear-btn" id="gif-clear-btn">✕</button>
    </div>
    <button id="gb-send-btn">send message</button>
    <p id="gb-feedback"></p>
    <p id="gb-count-label"></p>
  </div>

  <main class="wrapper" id="scene">
    <div class="text-wall" id="textWall"></div>
    <section class="floating-images" id="floatLayer"></section>
    <div class="center-card" id="centerCard">
      <h1 class="hb-main">Happy Birthday<br><span class="rain-name" id="rainName">Rain</span></h1>
      <p class="hb-sub">matanda ka na mahal</p>
    </div>
  </main>

  <p class="lyric">"I'm in the middle of your picture, lying in the reeds."</p>

  <script type="module">
    const TENOR_KEY = "AIzaSyAyimkuYQYF_FSpMx_R3d3ngENMcM2wfX8";

    const nebulaCanvas = document.getElementById("nebulaCanvas");
    const nCtx = nebulaCanvas.getContext("2d");
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    const centerCard = document.getElementById("centerCard");
    const rainName = document.getElementById("rainName");
    const floatLayer = document.getElementById("floatLayer");
    const textWall = document.getElementById("textWall");
    const bgMusic = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("music-btn");

    let playing = false;
    musicBtn.addEventListener("click", () => {
      if (!playing) { bgMusic.play(); musicBtn.textContent = "⏸ pause"; playing = true; }
      else { bgMusic.pause(); musicBtn.textContent = "▶ play music"; playing = false; }
    });

    const gbToggle = document.getElementById("gb-toggle");
    const gbPanel = document.getElementById("gb-panel");
    const gbMsgs = document.getElementById("gb-msgs");
    const gbEmptyMsg = document.getElementById("gb-empty-msg");
    const gbNameEl = document.getElementById("gb-name");
    const gbMsgEl = document.getElementById("gb-msg");
    const gbSendBtn = document.getElementById("gb-send-btn");
    const gbFeedback = document.getElementById("gb-feedback");
    const gbCountLabel = document.getElementById("gb-count-label");
    const gbGifBtn = document.getElementById("gb-gif-btn");
    const gifPicker = document.getElementById("gif-picker");
    const gifSearchInput = document.getElementById("gif-search-input");
    const gifResults = document.getElementById("gif-results");
    const gifLoading = document.getElementById("gif-loading");
    const gifSelectedWrap = document.getElementById("gif-selected-wrap");
    const gifSelectedImg = document.getElementById("gif-selected-img");
    const gifClearBtn = document.getElementById("gif-clear-btn");

    let selectedGifUrl = null;
    let gifSearchTimeout = null;

    gbGifBtn.addEventListener("click", () => { gifPicker.classList.toggle("open"); if (gifPicker.classList.contains("open")) loadTrendingGifs(); });
    gifClearBtn.addEventListener("click", () => { selectedGifUrl = null; gifSelectedWrap.style.display = "none"; document.querySelectorAll(".gif-item.selected").forEach(el => el.classList.remove("selected")); });

    async function loadTrendingGifs() {
      gifLoading.style.display = "block"; gifResults.innerHTML = "";
      try {
        const r = await fetch(`https://tenor.googleapis.com/v2/featured?key=${TENOR_KEY}&limit=18&media_filter=gif`);
        const d = await r.json();
        renderGifs(d.results || []);
      } catch(e) { gifLoading.textContent = "couldn't load gifs :("; }
      gifLoading.style.display = "none";
    }

    async function searchGifs(q) {
      gifLoading.style.display = "block"; gifResults.innerHTML = "";
      try {
        const r = await fetch(`https://tenor.googleapis.com/v2/search?key=${TENOR_KEY}&q=${encodeURIComponent(q)}&limit=18&media_filter=gif`);
        const d = await r.json();
        renderGifs(d.results || []);
      } catch(e) { gifLoading.textContent = "search failed :("; }
      gifLoading.style.display = "none";
    }

    function renderGifs(results) {
      gifResults.innerHTML = "";
      results.forEach(r => {
        const url = r.media_formats?.gif?.url || r.media_formats?.tinygif?.url;
        const preview = r.media_formats?.tinygif?.url || url;
        if (!url) return;
        const item = document.createElement("div");
        item.className = "gif-item";
        const img = document.createElement("img");
        img.src = preview; img.loading = "lazy";
        item.appendChild(img);
        item.addEventListener("click", () => {
          document.querySelectorAll(".gif-item.selected").forEach(el => el.classList.remove("selected"));
          item.classList.add("selected");
          selectedGifUrl = url;
          gifSelectedImg.src = preview;
          gifSelectedWrap.style.display = "flex";
          gifPicker.classList.remove("open");
        });
        gifResults.appendChild(item);
      });
    }

    gifSearchInput.addEventListener("input", () => {
      clearTimeout(gifSearchTimeout);
      const q = gifSearchInput.value.trim();
      if (!q) { loadTrendingGifs(); return; }
      gifSearchTimeout = setTimeout(() => searchGifs(q), 480);
    });

    const MSG_COLORS = ["#c4b5fd","#f9a8d4","#6ee7b7","#fde68a","#93c5fd","#fb7185"];
    function colorFor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return MSG_COLORS[h % MSG_COLORS.length];
    }
    function fmtTime(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString("en-PH", { month:"short", day:"numeric" }) + " " +
        d.toLocaleTimeString("en-PH", { hour:"2-digit", minute:"2-digit" });
    }
    function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function setFeedback(msg, isErr) {
      gbFeedback.textContent = msg;
      gbFeedback.style.color = isErr ? "rgba(251,113,133,0.8)" : "rgba(110,231,183,0.75)";
      if (msg) setTimeout(() => { gbFeedback.textContent = ""; }, 2800);
    }

    function renderMessages(msgs) {
      gbMsgs.innerHTML = "";
      if (!msgs || msgs.length === 0) { gbMsgs.appendChild(gbEmptyMsg); gbCountLabel.textContent = ""; return; }
      msgs.forEach(m => {
        const bub = document.createElement("div");
        bub.className = "gb-bubble";
        const col = colorFor(m.name);
        const ts = m.ts && m.ts.toDate ? m.ts.toDate() : new Date(m.ts);
        bub.innerHTML =
          '<span class="gb-btime">' + fmtTime(ts) + '</span>' +
          '<span class="gb-bname" style="color:' + col + '">' + escHtml(m.name.toUpperCase()) + '</span>' +
          '<p class="gb-btext">' + escHtml(m.text || "") + '</p>' +
          (m.gifUrl ? '<img class="gb-gif-preview" src="' + escHtml(m.gifUrl) + '" alt="gif" />' : "");
        gbMsgs.appendChild(bub);
      });
      gbCountLabel.textContent = msgs.length + (msgs.length === 1 ? " message" : " messages");
    }

    import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js").then(({ initializeApp }) => {
      return Promise.all([
        import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"),
      ]).then(([{ getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp }]) => {
        const app = initializeApp({
          apiKey: "AIzaSyCdqHfwAHB5-GXoZqKbStufFhKlN61RoTk",
          authDomain: "hbd-rvs.firebaseapp.com",
          projectId: "hbd-rvs",
          storageBucket: "hbd-rvs.firebasestorage.app",
          messagingSenderId: "868392429479",
          appId: "1:868392429479:web:5916542e97777068c5b882"
        });
        const db = getFirestore(app);
        const colRef = collection(db, "messages");
        const q = query(colRef, orderBy("ts", "desc"));
        onSnapshot(q, snap => { renderMessages(snap.docs.map(d => d.data())); });
        gbToggle.addEventListener("click", () => { gbPanel.classList.toggle("open"); });
        gbSendBtn.addEventListener("click", sendMsg);
        gbMsgEl.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); } });

        async function sendMsg() {
          const name = gbNameEl.value.trim();
          const text = gbMsgEl.value.trim();
          if (!name) { setFeedback("enter your name!", true); gbNameEl.focus(); return; }
          if (!text && !selectedGifUrl) { setFeedback("write something or pick a gif!", true); gbMsgEl.focus(); return; }
          gbSendBtn.disabled = true;
          try {
            const payload = { name, text: text || "", ts: serverTimestamp() };
            if (selectedGifUrl) payload.gifUrl = selectedGifUrl;
            await addDoc(colRef, payload);
            gbMsgEl.value = "";
            selectedGifUrl = null;
            gifSelectedWrap.style.display = "none";
            document.querySelectorAll(".gif-item.selected").forEach(el => el.classList.remove("selected"));
            setFeedback("message sent! ✦", false);
          } catch(e) { setFeedback("something went wrong :(", true); }
          gbSendBtn.disabled = false;
        }
      });
    });

    let W = window.innerWidth, H = window.innerHeight;
    let mx = W * 0.5, my = H * 0.5;

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W; canvas.height = H;
      nebulaCanvas.width = W; nebulaCanvas.height = H;
      drawNebula();
    }
    resize();
    window.addEventListener("resize", () => { resize(); });

    function drawNebula() {
      nCtx.clearRect(0, 0, W, H);
      const blobs = [
        { x: W * 0.12, y: H * 0.18, rx: W * 0.38, ry: H * 0.32, r: [139,92,246], a: 0.28 },
        { x: W * 0.88, y: H * 0.78, rx: W * 0.32, ry: H * 0.28, r: [236,72,153], a: 0.24 },
        { x: W * 0.5,  y: H * 0.5,  rx: W * 0.5,  ry: H * 0.4,  r: [16,10,35],   a: 0.6  },
        { x: W * 0.75, y: H * 0.2,  rx: W * 0.3,  ry: H * 0.25, r: [56,189,248], a: 0.18 },
        { x: W * 0.25, y: H * 0.82, rx: W * 0.28, ry: H * 0.22, r: [52,211,153], a: 0.16 },
        { x: W * 0.92, y: H * 0.35, rx: W * 0.22, ry: H * 0.3,  r: [251,191,36], a: 0.13 },
        { x: W * 0.08, y: H * 0.62, rx: W * 0.2,  ry: H * 0.28, r: [251,113,133],a: 0.15 },
        { x: W * 0.55, y: H * 0.12, rx: W * 0.25, ry: H * 0.2,  r: [167,139,250],a: 0.17 },
      ];
      for (const b of blobs) {
        const g = nCtx.createRadialGradient(b.x, b.y, 0, b.x, b.y, Math.max(b.rx, b.ry));
        g.addColorStop(0, `rgba(${b.r[0]},${b.r[1]},${b.r[2]},${b.a})`);
        g.addColorStop(0.5, `rgba(${b.r[0]},${b.r[1]},${b.r[2]},${b.a * 0.4})`);
        g.addColorStop(1, `rgba(${b.r[0]},${b.r[1]},${b.r[2]},0)`);
        nCtx.save();
        nCtx.translate(b.x, b.y);
        nCtx.scale(b.rx / Math.max(b.rx, b.ry), b.ry / Math.max(b.rx, b.ry));
        nCtx.translate(-b.x, -b.y);
        nCtx.fillStyle = g;
        nCtx.beginPath();
        nCtx.arc(b.x, b.y, Math.max(b.rx, b.ry), 0, Math.PI * 2);
        nCtx.fill();
        nCtx.restore();
      }
    }

    const TEXT_ROWS = [
      { text: "HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY", rev: false },
      { text: "IN RAIN/BOWS IN RAIN/BOWS IN RAIN/BOWS IN RAIN/BOWS IN RAIN/BOWS", rev: true },
      { text: "HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY", rev: false },
      { text: "IN RAINBOWS / IN RAINBOWS / IN RAINBOWS / IN RAINBOWS / IN RAINBOWS", rev: true },
      { text: "RA D'IOHEA D RA D'IOHEA D RA D'IOHEA D RA D'IOHEA D RA D'IOHEA D", rev: false },
      { text: "_RAD IO HEA D _RAD IO HEA D _RAD IO HEA D _RAD IO HEA D _RAD IO HEA", rev: true },
      { text: "HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY RAIN HAPPY BIRTHDAY", rev: false },
    ];

    TEXT_ROWS.forEach(row => {
      const div = document.createElement("div");
      div.className = "text-row";
      const span = document.createElement("span");
      span.textContent = row.text + " \u00A0\u00A0 " + row.text;
      div.appendChild(span);
      textWall.appendChild(div);
    });

    const RAIN_COLORS = [
      { color: "#c4b5fd", shadow: "rgba(196,181,253,0.9)" },
      { color: "#f9a8d4", shadow: "rgba(249,168,212,0.9)" },
      { color: "#6ee7b7", shadow: "rgba(110,231,183,0.9)" },
      { color: "#fde68a", shadow: "rgba(253,230,138,0.9)" },
      { color: "#93c5fd", shadow: "rgba(147,197,253,0.9)" },
      { color: "#fb7185", shadow: "rgba(251,113,133,0.9)" },
    ];
    let rainIdx = 0;
    function cycleRain() {
      const c = RAIN_COLORS[rainIdx % RAIN_COLORS.length];
      rainName.style.color = c.color;
      rainName.style.textShadow = `0 0 22px ${c.shadow}, 0 0 60px ${c.shadow.replace("0.9","0.35")}`;
      rainIdx++;
    }
    cycleRain();
    setInterval(cycleRain, 2800);

    const dots = Array.from({ length: 100 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.22,
      vy: (Math.random() - 0.5) * 0.22,
      r: Math.random() * 1.6 + 0.4,
      a: Math.random() * 0.32 + 0.08
    }));

    function drawDots() {
      ctx.clearRect(0, 0, W, H);
      for (const d of dots) {
        const ddx = mx - d.x, ddy = my - d.y;
        const dist = Math.hypot(ddx, ddy) || 1;
        const pull = Math.max(0, 1 - dist / 180) * 0.022;
        d.vx += (ddx / dist) * pull; d.vy += (ddy / dist) * pull;
        d.vx *= 0.991; d.vy *= 0.991;
        d.x += d.vx; d.y += d.vy;
        if (d.x < -10) d.x = W + 10;
        if (d.x > W + 10) d.x = -10;
        if (d.y < -10) d.y = H + 10;
        if (d.y > H + 10) d.y = -10;
        ctx.beginPath();
        ctx.fillStyle = `rgba(220,210,255,${d.a})`;
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const IMG_SRCS = [
      "rvs1.jpg","rvs2.jpg","rvs3.jpg","rvs4.jpg",
      "rvs5.jpg","rvs6.jpg","rvs7.jpg","rvs8.jpg",
      "rvs9.jpg","rvs10.jpg","rvs11.jpg","rvs12.jpg",
      "rvs13.jpg","rvs14.jpg","rvs15.jpg","rvs16.jpg",
    ];

    const GLOW_COLORS_RAW = [
      [196,181,253],[249,168,212],[110,231,183],
      [253,230,138],[147,197,253],[251,113,133],
      [167,139,250],[52,211,153],[251,191,36],[56,189,248],
    ];

    const STAR_PTS = "50,2 61,35 97,35 68,57 79,91 50,70 21,91 32,57 3,35 39,35";
    const ns = "http://www.w3.org/2000/svg";

    function rnd(a, b) { return a + Math.random() * (b - a); }
    function getSize() { return Math.max(110, Math.min(190, W * 0.14)); }

    const AVOID_R = 200;
    const RETURN_SPRING = 0.008;
    const RETURN_DAMP = 0.82;
    const WOBBLE_DAMP = 0.82;
    const margin = 20;
    const MIN_STAR_GAP = 160;
    const CENTER_CLEAR_R = 260;
    const MAX_ATTEMPTS = 500;

    function placeHomes(count, s) {
      const placed = [];
      const centerX = W * 0.5, centerY = H * 0.5;
      const topZone = H * 0.35, bottomZone = H * 0.65;
      for (let i = 0; i < count; i++) {
        let bestPos = null, bestScore = -Infinity;
        for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
          let hx, hy;
          const zone = Math.random();
          if (zone < 0.4) hy = rnd(margin, topZone - s - margin);
          else if (zone < 0.8) hy = rnd(bottomZone, H - s - margin);
          else hy = rnd(margin, H - s - margin);
          hx = rnd(margin, W - s - margin);
          const cx = hx + s * 0.5, cy = hy + s * 0.5;
          if (Math.hypot(cx - centerX, cy - centerY) < CENTER_CLEAR_R) continue;
          let minDist = placed.length === 0 ? Infinity : Infinity;
          for (const p of placed) { const d = Math.hypot(cx - p.cx, cy - p.cy); if (d < minDist) minDist = d; }
          if (placed.length === 0) minDist = Infinity;
          if (minDist >= MIN_STAR_GAP) { bestPos = { hx, hy, cx, cy }; break; }
          if (minDist > bestScore) { bestScore = minDist; bestPos = { hx, hy, cx, cy }; }
        }
        if (bestPos) placed.push(bestPos);
      }
      return placed;
    }

    const s0 = getSize();
    const homes = placeHomes(IMG_SRCS.length, s0);

    const floats = IMG_SRCS.map((src, i) => {
      const s = getSize();
      const { hx, hy } = homes[i] || { hx: rnd(margin, W - s - margin), hy: rnd(margin, H * 0.3) };
      const wrap = document.createElement("div");
      wrap.className = "float-wrap";
      wrap.style.left = hx + "px";
      wrap.style.top  = hy + "px";

      const [r,g,b] = GLOW_COLORS_RAW[i % GLOW_COLORS_RAW.length];
      const glowA = `rgba(${r},${g},${b},0.5)`;

      const svgEl = document.createElementNS(ns, "svg");
      svgEl.setAttribute("viewBox", "0 0 100 100");

      const defs = document.createElementNS(ns, "defs");
      const clipId = `sc${i}`;
      const cp = document.createElementNS(ns, "clipPath");
      cp.setAttribute("id", clipId);
      const cpPoly = document.createElementNS(ns, "polygon");
      cpPoly.setAttribute("points", STAR_PTS);
      cp.appendChild(cpPoly);

      const filterId = `gf${i}`;
      const filt = document.createElementNS(ns, "filter");
      filt.setAttribute("id", filterId);
      filt.setAttribute("x", "-50%"); filt.setAttribute("y", "-50%");
      filt.setAttribute("width", "200%"); filt.setAttribute("height", "200%");
      const feG = document.createElementNS(ns, "feGaussianBlur");
      feG.setAttribute("in", "SourceGraphic");
      feG.setAttribute("stdDeviation", "6");
      filt.appendChild(feG);
      defs.appendChild(cp); defs.appendChild(filt);
      svgEl.appendChild(defs);

      const glowPoly = document.createElementNS(ns, "polygon");
      glowPoly.setAttribute("points", STAR_PTS);
      glowPoly.setAttribute("fill", glowA);
      glowPoly.setAttribute("filter", `url(#${filterId})`);
      svgEl.appendChild(glowPoly);

      const imgEl = document.createElementNS(ns, "image");
      imgEl.setAttribute("href", src);
      imgEl.setAttribute("x", "0"); imgEl.setAttribute("y", "0");
      imgEl.setAttribute("width", "100"); imgEl.setAttribute("height", "100");
      imgEl.setAttribute("preserveAspectRatio", "xMidYMid slice");
      imgEl.setAttribute("clip-path", `url(#${clipId})`);
      svgEl.appendChild(imgEl);

      const borderPoly = document.createElementNS(ns, "polygon");
      borderPoly.setAttribute("points", STAR_PTS);
      borderPoly.setAttribute("fill", "none");
      borderPoly.setAttribute("stroke", glowA);
      borderPoly.setAttribute("stroke-width", "1.5");
      svgEl.appendChild(borderPoly);

      wrap.appendChild(svgEl);
      floatLayer.appendChild(wrap);

      return {
        wrap, hx, hy,
        x: hx, y: hy,
        vx: rnd(-0.08, 0.08),
        vy: rnd(-0.08, 0.08),
        phase: Math.random() * Math.PI * 2,
        phaseY: Math.random() * Math.PI * 2,
        idleAmpX: rnd(0.15, 0.35),
        idleAmpY: rnd(0.15, 0.35),
        idleSpeedX: rnd(0.0004, 0.0009),
        idleSpeedY: rnd(0.0005, 0.001),
        rotTarget: 0, rotCurrent: 0, rotVel: 0,
      };
    });

    let t = 0;
    function tick() {
      t++;
      drawDots();
      const s = getSize();

      for (const f of floats) {
        const cx = f.x + s * 0.5;
        const cy = f.y + s * 0.5;
        const dx = cx - mx, dy = cy - my;
        const dist = Math.hypot(dx, dy) || 1;
        const isFleeing = dist < AVOID_R;

        if (isFleeing) {
          const strength = ((AVOID_R - dist) / AVOID_R) * 0.5;
          f.vx += (dx / dist) * strength;
          f.vy += (dy / dist) * strength;
          f.vx *= WOBBLE_DAMP;
          f.vy *= WOBBLE_DAMP;
          f.wrap.style.opacity = "0.95";
          f.rotTarget = Math.max(-12, Math.min(12, f.vx * 22));
        } else {
          f.vx += (f.hx - f.x) * RETURN_SPRING;
          f.vy += (f.hy - f.y) * RETURN_SPRING;
          f.vx *= RETURN_DAMP;
          f.vy *= RETURN_DAMP;
          const idleX = Math.sin(t * f.idleSpeedX + f.phase) * f.idleAmpX;
          const idleY = Math.cos(t * f.idleSpeedY + f.phaseY) * f.idleAmpY;
          f.vx += idleX;
          f.vy += idleY;
          f.wrap.style.opacity = "0.7";
          f.rotTarget = Math.sin(t * f.idleSpeedX * 0.5 + f.phase) * 3.5;
        }

        f.rotVel += (f.rotTarget - f.rotCurrent) * 0.045;
        f.rotVel *= 0.88;
        f.rotCurrent += f.rotVel;

        f.x += f.vx;
        f.y += f.vy;

        const maxX = W - s - margin, maxY = H - s - margin;
        if (f.x < margin)  { f.x = margin;  f.vx *= -0.4; }
        if (f.x > maxX)    { f.x = maxX;    f.vx *= -0.4; }
        if (f.y < margin)  { f.y = margin;  f.vy *= -0.4; }
        if (f.y > maxY)    { f.y = maxY;    f.vy *= -0.4; }

        f.wrap.style.transform = `rotate(${f.rotCurrent.toFixed(2)}deg)`;
        f.wrap.style.left = f.x.toFixed(2) + "px";
        f.wrap.style.top  = f.y.toFixed(2) + "px";
      }

      requestAnimationFrame(tick);
    }
    tick();

    window.addEventListener("mousemove", e => {
      mx = e.clientX; my = e.clientY;
      const rx = (e.clientX - W * 0.5) / (W * 0.5);
      const ry = (e.clientY - H * 0.5) / (H * 0.5);
      centerCard.style.transform = `translate(${rx * -10}px, ${ry * -7}px)`;
    });

    window.addEventListener("click", e => {
      if (e.target.closest("#gb-panel") || e.target.closest("#gb-toggle")) return;
      const r = document.createElement("span");
      r.className = "ripple";
      r.style.left = e.clientX + "px";
      r.style.top  = e.clientY + "px";
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 800);
    });
  </script>
</body>
